<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HealthSync EHR - Secure Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
<div class="flex-1 flex flex-col items-center justify-center p-6 sm:p-12 bg-gradient-to-br from-primary/5 via-background-light to-primary/10 dark:from-background-dark dark:to-primary/20">
<div class="w-full max-w-[480px] bg-white dark:bg-slate-900/50 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800 p-8 md:p-12 backdrop-blur-sm">
<div class="flex flex-col items-center mb-10">
<div class="bg-primary p-3 rounded-xl mb-6 shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-white text-4xl block">
                        clinical_notes
                    </span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-extrabold tracking-tight mb-2">HealthSync EHR</h1>
<p class="text-slate-500 dark:text-slate-400 text-center text-sm">Authorized personnel only. Secure access to patient electronic health records.</p>
</div>
<form class="space-y-6">
<div>
<label class="block text-slate-700 dark:text-slate-300 text-sm font-semibold mb-2" for="username">
                        Username
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">person</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400" id="username" placeholder="Enter your username" type="text"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold" for="password">
                            Password
                        </label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="block w-full pl-11 pr-12 py-3.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-primary" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between py-2">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-slate-300 dark:border-slate-700 rounded transition-all cursor-pointer bg-slate-50 dark:bg-slate-800" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400 cursor-pointer select-none" for="remember-me">
                            Keep me logged in
                        </label>
</div>
<a class="text-sm font-semibold text-primary hover:text-primary/80 transition-colors" href="#">
                        Forgot Password?
                    </a>
</div>
<button class="w-full flex items-center justify-center gap-2 bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.98]" type="submit">
<span class="material-symbols-outlined">verified_user</span>
                    Secure Login
                </button>
</form>
<div class="mt-10 pt-8 border-t border-slate-100 dark:border-slate-800 flex flex-col sm:flex-row items-center justify-between gap-4">
<div class="flex items-center gap-2 text-slate-500 dark:text-slate-400 text-sm">
<span class="material-symbols-outlined text-lg">help_center</span>
<span>Need assistance?</span>
<a class="font-semibold text-primary hover:underline" href="#">Support Help</a>
</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-slate-300 dark:text-slate-600" title="HIPAA Compliant">security</span>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-600" title="Encrypted Connection">lock_reset</span>
</div>
</div>
</div>
<footer class="mt-8 text-slate-400 dark:text-slate-600 text-xs text-center">
<p>© 2024 HealthSync Systems Inc. All rights reserved.</p>
<p class="mt-1">HIPAA Compliant Secure EHR Portal v4.2.0</p>
</footer>
</div>
<div class="fixed top-0 left-0 w-full h-1 bg-primary/20">
<div class="h-full bg-primary w-1/3"></div>
</div>
</body></html>
